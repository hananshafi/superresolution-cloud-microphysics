services:
  gradio:
    container_name: cloudsr-gradio
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 7860:7860 # PORT by default is 7860
    volumes:
      - cloudsr_weights:/workspace/weights/
    ipc: host # shm
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu

volumes:
  cloudsr_weights:
    name: cloudsr_weights
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./weights

networks:
  default:
    name: cloudsr_net
